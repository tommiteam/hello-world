name: CI

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          IMAGE=ghcr.io/${{ github.repository }}
          TAG=${GITHUB_SHA}

          echo "Building $IMAGE:$TAG"
          docker build -t $IMAGE:$TAG .
          docker push $IMAGE:$TAG

      - name: Update infra repo with new image tag
        run: |
          git clone https://github.com/tommiteam/infra.git
          cd infra/cluster/apps/hello-world

          kustomize edit set image ghcr.io/tommiteam/hello-world=$GITHUB_SHA

          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git commit -am "Update hello-world image to $GITHUB_SHA"

          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/tommiteam/infra.git HEAD:main
