name: CI

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Update infra repo with new image tag
        run: |
          echo "DEBUG: Updating infra with new image tag"
          echo "DEBUG: Commit SHA = ${GITHUB_SHA}"
          echo "DEBUG: Actor       = ${GITHUB_ACTOR}"

          git clone https://x-access-token:${{ secrets.INFRA_PAT }}@github.com/tommiteam/infra.git
          cd infra/cluster/apps/hello-world

          echo "DEBUG: Running kustomize edit..."
          kustomize edit set image ghcr.io/tommiteam/hello-world=${GITHUB_SHA}

          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"

          echo "DEBUG: Checking for changes..."
          git status
          git diff || true

          git commit -am "Update hello-world image to ${GITHUB_SHA}" || echo "No changes to commit"
          echo "DEBUG: Pushing to main branch"
          git push origin HEAD:main

